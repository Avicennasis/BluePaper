name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared tests (desktop target)
        run: ./gradlew :shared:desktopTest

      - name: Compile desktop
        run: ./gradlew :shared:compileKotlinDesktop :desktopApp:compileKotlinDesktop

      - name: Compile Android
        run: ./gradlew :shared:compileDebugKotlinAndroid :androidApp:compileDebugKotlinAndroid
